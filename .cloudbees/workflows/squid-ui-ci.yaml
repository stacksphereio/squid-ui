# StackSphere squid-ui CI Pipeline
# ARCH VERSION: 0.5
# Purpose: Automated CI/CD with dev/integ deployment
# Production upload test

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: squid-ui CI

permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      enable_smart_tests:
        description: "Enable CloudBees Smart Tests integration"
        required: false
        type: string
        default: "true"

jobs:
  test:
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-test.yaml@main
    with:
      component_name: squid-ui
      language: node
      coverage_root: src
      enable_smart_tests: "true"
    secrets: inherit
    vars: inherit

  build:
    needs: test
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-build.yaml@main
    with:
      component_name: squid-ui
      docker_user: ${{ vars.DOCKER_USER }}
      commit_sha: ${{ cloudbees.scm.sha }}
      push_latest: "true"
    secrets: inherit
    vars: inherit

  deploy-dev:
    if: ${{ cloudbees.scm.branch != 'main' }}
    needs: build
    environment: dev
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-deploy.yaml@feature/squidstack-release-implementation
    with:
      component_name: squid-ui
      version: ${{ needs.build.outputs.VERSION }}
      environment: dev
      stack_name: squid
      docker_repo: ${{ vars.DOCKER_USER }}/squid-ui
      artifact_id: ${{ needs.build.outputs.PRIMARY_ARTIFACT_ID }}
      commit_sha: ${{ cloudbees.scm.sha }}
      database_mode: "no-database"
      enable_liquibase: "false"
      hostname: squid.dev.stacksphereio.se-main-demo.sa-demo.beescloud.com
      feature_flags_enabled: true
      feature_flags_secret_name: squid-ui-fmkey
      feature_flags_secret_key: FM_KEY
      feature_flags_create_secret: true
    secrets: inherit
    vars: inherit

  deploy-integ:
    if: ${{ cloudbees.scm.branch == 'main' }}
    needs: build
    environment: integ
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-deploy.yaml@feature/squidstack-release-implementation
    with:
      component_name: squid-ui
      version: ${{ needs.build.outputs.VERSION }}
      environment: integ
      stack_name: squid
      docker_repo: ${{ vars.DOCKER_USER }}/squid-ui
      artifact_id: ${{ needs.build.outputs.PRIMARY_ARTIFACT_ID }}
      commit_sha: ${{ cloudbees.scm.sha }}
      database_mode: "no-database"
      enable_liquibase: "false"
      hostname: squid.integ.stacksphereio.se-main-demo.sa-demo.beescloud.com
      feature_flags_enabled: true
      feature_flags_secret_name: squid-ui-fmkey
      feature_flags_secret_key: FM_KEY
      feature_flags_create_secret: true
    secrets: inherit
    vars: inherit

  trigger-release:
    if: ${{ cloudbees.scm.branch != 'main' }}  # Temporarily != for feature branch testing
    needs: [test, build, deploy-integ]
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/application-release.yaml@feature/squidstack-release-implementation
    with:
      stack_name: squid
      triggering_component: squid-ui
      version: ${{ needs.build.outputs.VERSION }}
      cb_org_id: "03a71b92-0b3d-46eb-8669-a348abbf7be2"
      cb_application_id: "141f29cf-eefa-4a47-9f26-1e7af6e2de13"
      cb_workflow_id: "3ba243f5-8da2-403f-a244-5e2bca953896"
      dry_run: "false"  # Live mode - creates actual release
      smart_tests_component: squid-ui
      smart_tests_build_name: ${{ needs.test.outputs.SMART_TESTS_BUILD_NAME }}
    secrets: inherit
    vars: inherit
